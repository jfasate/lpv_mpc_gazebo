lpv_mpc_node:
  ros__parameters:
    use_sim_time: true

    # ── Reference line: the SINGLE place to choose which CSV to follow ──
    # Bare name resolves to src/csv_data/<name>.csv (or give a full '/...' path).
    #   'test_worldv5'          - raw centerline (has undrivable hairpins)
    #   'test_worldv5_optimize' - optimized corner-cut racing line  <-- follow this
    #   'test_worldv5_mincurv'  - my min-curvature line (parked)
    reference_csv: 'test_worldv5_optimize'
    # Lowered to 0.4: run the whole lap inside the linear-tire regime (slip small)
    # so the MPC's model is valid and the car actually tracks. Raise once stable.
    speed_scale: 0.90      # Scale waypoint speeds (increase in small steps once stable)

    # Drive-speed command (velocity setpoint sent to the sim servo).
    #   speed_ff_blend    : 0 = pure MPC accel-integration, 1 = pure raceline
    #                       feedforward. The feedforward commands the profiled
    #                       CSV speed directly so the servo applies real effort.
    #   cmd_accel_horizon : integration time [s] for the MPC accel term. Was
    #                       hardcoded to Ts=0.02 (only +0.06 m/s/tick, which
    #                       starved the servo); 0.15 gives up to +0.45 m/s/tick.
    speed_ff_blend: 0.0
    adaptive_speed_ff_enabled: true
    adaptive_speed_ff_blend_max: 0.40
    adaptive_speed_ff_risk_start: 0.60
    adaptive_speed_ff_slip_deg: 5.0
    adaptive_speed_ff_clearance_soft: 1.30
    adaptive_speed_ff_clearance_hard: 0.90
    cmd_accel_horizon: 0.15

    # Brake-lookahead: command the highest speed that can still brake (at
    # speed_lookahead_decel m/s^2) down to every reference speed within
    # speed_lookahead_time seconds ahead. Stops the car arriving at corners too
    # hot. Increase lookahead_time if it still enters corners fast; lower decel
    # to brake earlier/more conservatively.
    speed_lookahead_time: 1.2
    speed_lookahead_decel: 4.0

    # Recovery guard: current-state and prediction-based safety caps. The
    # predictive guard catches cases where current error is still small but the
    # MPC horizon is already diverging from the raceline.
    recovery_lat_err: 0.8
    recovery_heading_err_deg: 30.0
    recovery_hard_lat_err: 2.0
    recovery_hard_heading_err_deg: 60.0
    recovery_soft_speed_cap: 4.8
    recovery_speed_cap: 3.4
    recovery_soft_accel_cap: 1.0
    recovery_accel_cap: 0.0
    predictive_recovery_lat_growth: 0.85
    predictive_recovery_lat_end: 1.00
    predictive_recovery_heading_err_deg: 45.0
    predictive_recovery_hard_lat_growth: 2.50
    predictive_recovery_hard_lat_end: 3.00
    predictive_recovery_hard_heading_err_deg: 85.0

    # Soft state constraints: slack on the state-limit rows so the QP is ALWAYS
    # feasible -> the controller never freezes the steering mid-slide. Slack is
    # penalised (L1 + L2); raise the penalties to hug the limits harder, lower
    # them to let the car exceed limits more gracefully. Set soft_constraints
    # false to revert to the old hard (can-be-infeasible) QP.
    # Penalties raised 10x: the previous (low) values let the QP freely violate
    # the lateral-velocity/slip limit, so the car slid/spun off the line. High
    # penalties make it respect grip (won't casually slide) while still being
    # always-feasible (never freezes the steering).
    soft_constraints: true
    slack_penalty_lin: 100000.0
    slack_penalty_quad: 1000.0

    # Per-run CSV debug log. Set enable_csv_log:false to turn off. log_dir is
    # normally overridden by the launch file to src/lpv_mpc_gazebo/log; this default is
    # only used when the node is run directly (ros2 run) without the launch.
    enable_csv_log: true
    # log_dir: '/home/jayesh/sim_gazebo/src/lpv_mpc_gazebo/log'

    # ROS topics
    odom_topic: '/ego_racecar/odom'
    scan_topic: '/scan'
    drive_topic: '/drive'

    # /scan wall-clearance logging. The lidar scan is centered on the vehicle
    # front in ROS LaserScan convention: front=0 deg, left=+90 deg, right=-90 deg.
    scan_front_angle_deg: 0.0
    scan_left_angle_deg: 90.0
    scan_right_angle_deg: -90.0
    scan_sector_width_deg: 10.0

    # Wall/object avoidance guard. MPPI handles walls with a distance-field
    # soft-hinge cost; this LPV-MPC version uses the same idea as a deterministic
    # LiDAR clearance speed cap. Outside the soft clearance it does nothing.
    # Inside the soft/hard band it ramps speed from wall_soft_speed_cap to
    # wall_hard_speed_cap and prevents further acceleration. At/below the hard
    # clearance it commands extra braking if the car is still above the cap.
    wall_avoidance_enabled: true
    wall_soft_clearance: 0.75
    wall_hard_clearance: 0.40
    wall_front_soft_clearance: 1.50
    wall_front_hard_clearance: 0.60
    wall_soft_speed_cap: 4.8
    wall_hard_speed_cap: 2.0
    wall_accel_cap: 0.0
    wall_brake_gain: 1.0
    wall_scan_max_age: 0.20

    # Forward-corridor obstacle detector. LiDAR points inside this corridor are
    # treated like MPPI keep-out costs: speed is capped when an object is close
    # in distance or time-to-collision. This catches objects/walls that are not
    # exactly on the single front beam.
    obstacle_avoidance_enabled: true
    obstacle_forward_angle_deg: 55.0
    obstacle_corridor_width: 0.75
    obstacle_soft_distance: 3.00
    obstacle_hard_distance: 0.90
    obstacle_soft_speed_cap: 6.8
    obstacle_hard_speed_cap: 1.5
    obstacle_ttc_soft: 1.35
    obstacle_ttc_hard: 0.75
    obstacle_brake_gain: 0.6

    # QP solver ('cvxopt', 'osqp', 'ecos', 'scs')
    qp_solver: 'osqp'

    # The linearized model is discretized with classic RK4 (Taylor-4 of the
    # matrix exponential). It is not configurable.

    # MPC timing
    Ts: 0.02              # Sample time [s] (50 Hz control loop)
    hz: 60                # Prediction horizon [steps] (60 * 0.02s = 1.2s)

    # F1Tenth vehicle parameters (from f110_gym simulator)
    m: 3.74               # Mass [kg]
    Iz: 0.04712           # Yaw moment of inertia [kg*m^2]
    Cf: 123.0             # Front cornering stiffness [N/rad]
    Cr: 131.0             # Rear cornering stiffness [N/rad]
    lf: 0.15875           # CG to front axle [m]
    lr: 0.17145           # CG to rear axle [m]
    mju: 0.015            # Rolling resistance coefficient
    steer_rate_limit: 3.2 # Steering actuator rate [rad/s], matches dynamics plant
    d_a_max: 0.5          # MPC accel-input change limit [m/s^2 per control step]

    # MPC cost weights (diagonal entries)
    #   Q, S: output weights for [x_dot, psi, X, Y]
    #   R:    input-rate weights for [d_delta, d_a]
    #   Q/S: [x_dot_weight, psi_weight, X_weight, Y_weight]
    #   R:   [d_delta_weight, d_accel_weight]
    #   High x_dot weight → track CSV speed profile (slows for curves)
    #   High psi weight   → follow heading (prevents oversteer/understeer)
    #   Moderate X/Y      → follow position without oscillation
    #   High R[0]         → smooth steering (prevents oscillation)
    Q_diag: [500.0, 2500.0, 1500.0, 1500.0]
    S_diag: [500.0, 2500.0, 1500.0, 1500.0]
    R_diag: [55.0, 8.0]
